name: Check & Release

env:
  PROGRAM_NAME: "MiNavBarImmerse"

on:
  pull_request:
    branches: [main]
    paths:
      - "module/immerse_rules.json"
  push:
    branches: [main]
    paths:
      - "module/**"
  workflow_dispatch:

jobs:
  Validate-JSON:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库文件
        uses: actions/checkout@v6 # 建议使用稳定版本 v4

      - name: 安装依赖
        run: |
          pip3 install -r scripts/requirements.txt

      - name: 校验JSON文件
        run: |
          python3 scripts/validate_json.py

  Sort-And-Build:
    permissions:
      contents: write # 必须保留，否则无法发布 Release
    runs-on: ubuntu-latest
    needs: Validate-JSON
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 检出仓库文件
        uses: actions/checkout@v6

      - name: 安装依赖
        run: |
          pip3 install -r scripts/requirements.txt

      - name: 运行编译脚本
        run: |
          python3 scripts/release.py

      - name: 准备打包信息
        id: prep
        run: |
          # 获取当前时间作为版本号
          VERSION=$(date +'%Y%m%d%H%M')
          # 将版本号传递给后续步骤使用
          echo "module_version=$VERSION" >> $GITHUB_OUTPUT
          
          # 更新 module.prop 里的版本号（仅在构建环境内，不推送到 Git）
          FILE=module/module.prop
          sed -i "s/^version=.*/version=$VERSION/" $FILE
          sed -i "s/^versionCode=.*/versionCode=${{ github.run_number }}/" $FILE

      - name: 压缩模块文件
        run: |
          cd module
          # 打包所有文件到上级目录，命名为 zip
          zip -r ../MiNavBarImmerse_${{ steps.prep.outputs.module_version }}.zip .

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          name: MiNavBarImmerse_${{ steps.prep.outputs.module_version }}
          tag_name: Build_${{ steps.prep.outputs.module_version }}
          files: MiNavBarImmerse_${{ steps.prep.outputs.module_version }}.zip
          token: ${{ secrets.GITHUB_TOKEN }} # 使用系统内置 Token，无需手动设置
          generate_release_notes: true
