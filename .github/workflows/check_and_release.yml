name: Check & Release

env:
  PROGRAM_NAME: "MiNavBarImmerse"

on:
  pull_request:
    branches: [main]
    paths:
      - "module/immerse_rules.json"

  push:
    branches: [main]
    paths:
      - "module/**"
  workflow_dispatch:

jobs:
  Validate-JSON:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库文件
        uses: actions/checkout@v6

      - name: 安装依赖
        run: |
          pip3 install -r scripts/requirements.txt

      - name: 校验JSON文件
        run: |
          python3 scripts/validate_json.py

  Sort-And-Build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: Validate-JSON
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    env:
      TZ: Asia/Shanghai

    steps:
      - name: 检出仓库文件
        uses: actions/checkout@v6

      - name: 安装依赖
        run: |
          pip3 install -r scripts/requirements.txt

      - name: 生成多版本配置文件
        run: |
          python3 scripts/release.py

      - name: 更新模块文件
        id: update_module_files
        run: |
          FILE=module/module.prop

          VERSION=$(date +'%Y%m%d%H%M')
          VERSION_CODE=${{ github.run_number }}

          base=$(echo "${{ secrets.DUFS_URL }}" | sed 's:/*$::')

          sed -i "s/^version=.*/version=$VERSION/" $FILE
          sed -i "s/^versionCode=.*/versionCode=$VERSION_CODE/" $FILE

          ZIP_NAME="MiNavBarImmerse_${VERSION}.zip"
          cat <<EOF > update.json
          {
            "version": "$VERSION",
            "versionCode": $VERSION_CODE,
            "zipUrl": "$base/code/${{ env.PROGRAM_NAME }}/${{ env.PROGRAM_NAME }}.zip",
            "changelog": "$base/code/${{ env.PROGRAM_NAME }}/changelog.md"
          }
          EOF
          
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add module/immerse_rules.json

          git commit -m "Release Version: $VERSION" --author="${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
          git push

          echo "MODULE_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: 压缩模块文件
        run: |
          cd module
          zip -r ../MiNavBarImmerse_${{ steps.update_module_files.outputs.module_version }}.zip .

      - name: 上传到Release
        uses: softprops/action-gh-release@v2
        with:
          name: MiNavBarImmerse_${{ steps.update_module_files.outputs.module_version }}
          tag_name: AutoBuild_${{ steps.update_module_files.outputs.module_version }}
          files: MiNavBarImmerse_${{ steps.update_module_files.outputs.module_version }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
